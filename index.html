<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Price Track</title>
  <style> 
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%;
      overflow: hidden;
      background-color: #f8f9fa;
    } 
    .crop-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% + 50px); 
      overflow: hidden;
    }
    .crop-container iframe { 
      position: absolute;
      top: -50px; 
      left: 0;
      width: 100%; 
      height: 100%; 
      border: none; 
      display: block;
    } 
  </style>
</head>
<body>

  <div class="crop-container">
    <!-- 
      KUNCI ANTI-REFUSED & ALLOW GEOLOCATION DI GITHUB:
      1. Ditambahkan ?authuser=0 agar Google tidak bingung mencari akun saat di-refresh.
      2. Atribut 'allow' disetel lengkap dengan wildcard (*) agar GitHub meneruskan izin GPS ke server Google.
    -->
    <iframe 
      src="https://script.google.com/macros/s/AKfycbxyt3PV9zvXU7TRkoVUKTAJK36NUGlb0d5BtSE5HvDUVMct6px2oZxpa12VVJkf5q4F/exec?authuser=0"
      allow="geolocation *; clipboard-write"
      sandbox="allow-same-origin allow-forms allow-scripts allow-popups allow-downloads allow-modals allow-popups-to-escape-sandbox">
    </iframe>
  </div>

</body>
</html>
